services:
  - type: web
    name: a100-project
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: DEFAULT_SYMBOLS
        value: BTC,ETH,SOL,XRP,DOGE,UNI,LINK,AAVE,KAITO,ARKM,SYN,SENT,ALT,VANRY,CELO,COTI,NFP,TIA,INJ,WLD,ZEC,ONDO,ENA,PENDLE,JTO
      - key: TOP_SCAN_LIMIT
        value: "8"
      - key: FAST_SCAN_LIMIT
        value: "25"
      - key: CG_PREFILTER_LIMIT
        value: "8"
      - key: CG_CACHE_TTL
        value: "900"
      - key: CG_MIN_INTERVAL
        value: "1.2"
      - key: CG_429_COOLDOWN
        value: "900"
      - key: NEWS_TTL
        value: "900"
      - key: ULTIMATE_TTL
        value: "600"
      - key: AUTO_NEWS
        value: "1"
      - key: AUTO_MARKET
        value: "1"
      - key: AUTO_FEAR_GREED
        value: "1"
      - key: SPEED_SCAN_LIMIT
        value: "12"
      - key: SPEED_FINAL_LIMIT
        value: "3"
      - key: SPEED_TTL
        value: "300"
