services:
  - type: web
    name: a100-project
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -u main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: DEFAULT_SYMBOLS
        value: BTC,ETH,SOL,XRP,DOGE,UNI,LINK,AAVE,KAITO,ARKM,SYN,SENT,ALT,VANRY,CELO,COTI,NFP,TIA,INJ,WLD,ZEC,ONDO,ENA,PENDLE,JTO
      - key: TOP_SCAN_LIMIT
        value: "5"
      - key: FAST_SCAN_LIMIT
        value: "25"
      - key: CG_PREFILTER_LIMIT
        value: "8"
      - key: CG_CACHE_TTL
        value: "900"
      - key: CG_MIN_INTERVAL
        value: "1.2"
      - key: CG_429_COOLDOWN
        value: "900"
      - key: NEWS_TTL
        value: "900"
      - key: ULTIMATE_TTL
        value: "600"
      - key: AUTO_NEWS
        value: "1"
      - key: AUTO_MARKET
        value: "1"
      - key: AUTO_FEAR_GREED
        value: "1"
      - key: SPEED_SCAN_LIMIT
        value: "8"
      - key: SPEED_FINAL_LIMIT
        value: "3"
      - key: SPEED_TTL
        value: "300"

      - key: TICKER_TTL
        value: "20"

      - key: ULTRA_TTL
        value: "180"

      - key: ULTRA_LIMIT
        value: "5"

      - key: ULTRA_TOP
        value: "3"

      - key: HYPER_TTL
        value: "120"

      - key: HYPER_TICKER_LIMIT
        value: "5"

      - key: HYPER_FINAL_TOP
        value: "3"

      - key: PARALLEL_WORKERS
        value: "5"

      - key: V39_LIMIT
        value: "5"

      - key: V39_TOP
        value: "3"

      - key: V39_TTL
        value: "120"

      - key: KLINE_RESULT_TTL
        value: "60"

      - key: V40_TTL
        value: "120"

      - key: V40_LIMIT
        value: "5"

      - key: V40_TOP
        value: "3"

      - key: V41_MIN_SCORE
        value: "50"

      - key: V41_TRACK_LIMIT
        value: "200"

      - key: TRACK_FILE
        value: "a100_recommendations.json"

      - key: V41_LIMIT
        value: "5"

      - key: V41_TOP
        value: "3"

      - key: V42_TICKER_TTL
        value: "20"

      - key: V42_LIMIT
        value: "20"

      - key: V42_ANALYZE_LIMIT
        value: "7"

      - key: V42_TOP
        value: "5"

      - key: V42_MIN_SCORE
        value: "48"

      - key: V43_TICKER_TTL
        value: "30"

      - key: V43_TIMEOUT
        value: "7"

      - key: V43_LIMIT
        value: "30"

      - key: V43_ANALYZE_LIMIT
        value: "8"

      - key: V43_TOP
        value: "5"

      - key: V43_MIN_SCORE
        value: "48"

      - key: V44_RETRY_MIN
        value: "5"

      - key: V44_RETRY_MAX
        value: "60"

      - key: V44_LOCK_FILE
        value: "/tmp/a100_telegram_polling.lock"

      - key: V45_BINANCE_TIMEOUT
        value: "7"

      - key: V45_CG_TIMEOUT
        value: "10"

      - key: V45_CG_TTL
        value: "900"

      - key: V45_BINANCE_TTL
        value: "30"

      - key: V45_CG_COOLDOWN
        value: "900"
