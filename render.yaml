services:
  - type: web
    name: a100-project
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: DEFAULT_SYMBOLS
        value: BTC,ETH,SOL,XRP,DOGE,UNI,LINK,AAVE,KAITO,ARKM,SYN,SENT,ALT,VANRY,CELO,COTI,NFP,TIA,INJ,WLD,ZEC,ONDO,ENA,PENDLE,JTO
      - key: SCORE_ALERT
        value: "85"
      - key: TOP_SCAN_LIMIT
        value: "15"
      - key: CG_CACHE_TTL
        value: "300"
      - key: CG_MIN_INTERVAL
        value: "0.45"
      - key: AUTO_MACRO_TTL
        value: "900"
      - key: NEWS_TTL
        value: "900"
      - key: AUTO_FEAR_GREED
        value: "1"
      - key: AUTO_MARKET
        value: "1"
      - key: AUTO_NEWS
        value: "1"
      - key: MACRO_RISK
        value: "35"
      - key: AUTO_EVENTS_JSON
        value: ""
      - key: FOMC_DAYS
        value: "99"
      - key: CPI_DAYS
        value: "99"
      - key: PPI_DAYS
        value: "99"
      - key: PCE_DAYS
        value: "99"
      - key: NFP_DAYS
        value: "99"
      - key: GDP_DAYS
        value: "99"
      - key: WAR_RISK
        value: "0"
      - key: NEWS_RISK
        value: "0"
      - key: FEAR_GREED
        value: "50"
      - key: DXY_TREND
        value: "0"
      - key: VIX_LEVEL
        value: "15"
      - key: BTC_DOM_TREND
        value: "0"
      - key: USDT_DOM_TREND
        value: "0"
      - key: US10Y_TREND
        value: "0"
      - key: ETF_FLOW_M
        value: "0"
      - key: WHALE_RISK
        value: "0"
      - key: MACRO_NOTE
        value: "자동/수동 매크로 입력 없음"
